name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # weekly, so new query packs catch regressions even without a push
    - cron: '23 4 * * 1'

jobs:
  analyze:
    name: CodeQL / c-cpp
    runs-on: ubuntu-latest
    # Debian trixie ships OpenSSL 3.5, which the extension needs to build;
    # the stock Ubuntu runner only has OpenSSL 3.0.
    container: php:8.5-cli
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential autoconf pkg-config libssl-dev git

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended

      - name: Build
        run: |
          phpize
          ./configure --with-quic
          make -j"$(nproc)"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
